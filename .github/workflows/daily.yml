name: daily-pullback

# 매일 22:00 UTC (= 07:00 KST, 미국 전일장 마감 후) 자동 실행.
# 수동 실행도 가능(Actions 탭 → Run workflow).
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 결과 CSV를 레포에 커밋하기 위해 필요

jobs:
  scan-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (이전 결과 포함)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: config.json 생성 (키는 Secret에서 주입)
        run: cp config.example.json config.json

      - name: 키 주입 확인 (값은 노출 안 함)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "::error::POLYGON_API_KEY Secret이 비어있거나 없습니다. Settings → Secrets and variables → Actions → Repository secrets 에 'POLYGON_API_KEY' 로 등록했는지 확인하세요."
            exit 1
          fi
          echo "키 주입 확인됨 (길이: ${#POLYGON_API_KEY}자)"

      - name: 눌림목 스캔 (오늘 후보 추출)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python pullback_scanner.py

      - name: 자동 검증 (전일 픽 채점)
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python daily_verify.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "daily scan+verify (UTC $(date -u +%F))"
          git push
